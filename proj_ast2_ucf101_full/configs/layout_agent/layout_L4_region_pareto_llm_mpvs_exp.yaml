_base_: base_layout_exp.yaml

detailed_place:
  planner:
    # Only keep atomic ops + 3 macro families. No LLM planning in mainline.
    type: heuristic
    require_llm: false
    queue_enabled: false
    feasibility_check: false

  mpvs:
    enabled: true
    cache_size: 12000
    proposer:
      k_heur: 12
      # Disable LLM sources entirely (keep only atomic + macros).
      k_llm: 0
      llm_every_n_steps: 1000000
      llm_allow_direction_bias: false
      quota:
        heur: 10
        llm_atomic: 0
        llm_macro: 0
        # Keep ONLY 3 macro families (chain/ruin_repair/block_relocate)
        macro: 3
        # Disable memory source (keep only atomic + macros)
        mem: 0

    # Unified MPVS controller: gates macro/mem/llm based on ROI + cooldown (budget-aware)
    controller:
      # v2 controller core params (kept small; most behavior is self-calibrating)
      ewma_alpha: 0.2
      ewma_alpha_long: 0.1
      budget_stage:
        early_frac: 0.20
        # Start late stage earlier so BC^2-CEC has enough runway to sponsor + mature tickets.
        late_frac: 0.55
      share:
        min_samples: 10
        slack_scale: 0.5
      cec:
        enabled: true
        family_blend_tau: 8
        family_min_samples: 1
        local_min_samples: 1
        seed_trials_per_family: 2
        sponsor_stages: ["late"]
        direct_pass_trial_stages: ["late"]
        seed_trials_per_family_mid: 0
        seed_trials_per_family_late: 4
        direct_pass_seed_trials_per_family: 1
        seed_allow_low_sample: true
        seed_min_pass_heur: 1
        family_cooldown_steps: 3
        trial_max_per_step: 3
        # v2.4 release / horizon
        ticket_horizon_min: 300
        ticket_horizon_frac: 0.01
        ticket_horizon_mid_remaining_frac: 0.45
        ticket_horizon_late_remaining_frac: 0.25
        ticket_horizon_mid_cap: 6000
        ticket_horizon_late_cap: 2500
        candidate_release: true
        family_stage_prior: true
        # allow tiny numerical noise; still essentially ">=0"
        release_credit_floor: -1.0e-4
        release_roi_floor_local: 0.0
        release_roi_floor_family: 0.0
        release_trial_score_floor: -0.02
        release_edge_floor: -0.02
        release_keep_roi_floor_local: -0.000001
        release_keep_roi_floor_family: -0.000001
        release_keep_trial_score_floor: -0.05
        candidate_grace_maturities: 1
        candidate_grace_calls_mid: 2000
        candidate_grace_calls_late: 1200
        # BC^2-CEC: reduce expected atomic gain a bit to avoid systematic negative gain_cf
        counterfactual_discount: 0.5
        context:
          stagn_ratio_edges: [0.75, 1.50]
          repeat_ratio_edges: [0.55, 0.75]
          blocked_ratio_edges: [0.15, 0.35]
      stagn_norm: 20
      repeat_hi: 0.75
      macro:
        enabled: true
        enable_when_stagnation_ge: 12
        min_interval_steps: 3
        roi_floor: 0.0
        allow_cold_start: true
        cooldown_fail: 10
        max_fail_streak: 3
        quota_min: 1
        quota_max: 4
        quota_boost_roi: 0.001
      mem:
        enabled: false
        enable_when_stagnation_ge: 12
        min_interval_steps: 5
        roi_floor: 0.0
        allow_cold_start: true
        cooldown_fail: 20
        max_fail_streak: 3
        quota_min: 0
        quota_max: 2
        quota_boost_roi: 0.0005
      llm:
        enabled: false
        shadow_mode: false
        enable_when_stagnation_ge: 25
        enable_when_distress_ge: 0.7
        enable_when_repeat_ratio_ge: 0.8
        min_interval_steps: 80
        roi_floor: 0.0
        allow_cold_start: true
        cooldown_fail: 200
        max_fail_streak: 1
        quota_min: 0
        quota_max: 1
        success_min_gain: 0.0002
      mem_global:
        window: 40
        fail_rate_hi: 0.75
        roi_floor: 0.00005
        cooldown_steps: 30
    macros:
      enabled: true
      # Keep ONLY these 3 macro families in the mainline universe.
      base: ["chain", "ruin_repair", "block_relocate"]
      extra_on_stagnation: []
      enable_base_when_stagnation_ge: 0
      enable_extra_when_stagnation_ge: 999999
      max_macros: 3
      # chain uses n_steps; ruin/block have their own internal steps.
      n_steps: 5

      # Stronger macro engine (delta-based proposing + limited verification)
      engine: delta_v1
      delta:
        candidate_k: 30
        eval_topk_per_step: 2
        partner_topk: 8
        empty_site_k: 20
        hot_slots_k: 12
        therm_hot_k: 10
        therm_cold_k: 10
        monotone: true
      adapt:
        enabled: true
        ewma_alpha: 0.2
        fail_cooldown: 20
        success_cooldown: 0
        success_boost: 0.2
        fail_penalty: 0.2
        weight_floor: 0.1
        weight_cap: 5.0

      # --- Macro family configs (explicit for reproducibility) ---
      chain:
        chain_len: 5
        propose_chains: 24
        eval_topk: 6
        step_topk: 10
        step_sample_topk: 3

      block_relocate:
        block_size: 3
        seed_topk: 10
        partner_topk: 8
        external_partner_topk: 4
        anchor_topk: 6
        candidate_blocks: 24
        eval_topk: 8
        use_empty_only: false
        perm_sites_k: 6
        perm_limit: 120
        score_w_est: 1.0
        score_w_internal: 1.0e-6
        score_w_compact: 1.0e-6
        score_w_centroid: 5.0e-7

      ruin_repair:
        ruin_ratios: [0.08, 0.15, 0.25]
        candidates_per_ratio: 3
        eval_topk: 8
        hot_comm_k: 12
        hot_therm_k: 10
        hot_prob: 0.75
        ruin_site_mode: far
        far_site_k: 24
        eval_random: 1
        repair_pick: best
        repair_steps: 10
        repair_step_topk: 20
        repair_step_sample_topk: 2
    explore:
      mode: hybrid
      every_n_steps: 20
      when_stagnation_ge: 12
      warmup_steps: 30
      max_consecutive_steps: 2
    verifier:
      # Verifier v1: lite/full + ROI accounting
      roi_ewma_alpha: 0.2
      lite_topk: 10
      max_lite_verify: 12
      full_topk: 2
      max_full_verify: 3
      full_macro_steps: 3
      horizon: 3
      mc: 1
      greedy_topm: 1
      refine_sa_calls: 12
      max_plans: 20
      early_stop_margin: 0.01
      min_cover_groups: 3
      tie_eps: 0.002
      tie_explore_when_stagnation_ge: 10
      direction_bias_beta: 0.02
      full_verify_topk: 2
      fast_macro_steps: 1
      safe_enabled: true
      safe_eps_early: 0.0005
      safe_eps_late: 0.002
      safe_eps_switch_stagnation: 15
      nonheuristic_require_improve: true
      nonheuristic_improve_margin_early: 0.0002
      nonheuristic_improve_margin_late: 0.0001
      nonheuristic_improve_randw_scale: 2.0

      # P1: non-heuristic must also beat CURRENT by a minimum gain.
      nonheuristic_min_gain_current_early: 0.0
      nonheuristic_min_gain_current_late: 0.00005
      nonheuristic_min_gain_current_switch_stagnation: 15
      nonheuristic_min_gain_current_randw_scale: 1.0
      nonheuristic_min_gain_current_late_macro_cap: 0.00005
      llm_min_gain_current: 0.0002
      full_verify_always_include_sources: ["heuristic"]
      macro_gain_gate_enabled: true
      macro_gain_margin_early: 0.001
      macro_gain_margin_late: 0.00005
      macro_gain_switch_stagnation: 20
      macro_gain_randw_scale: 1.5
      macro_cost_lambda: 2e-7

      # -------- P1: strict macro admission + macro-monotone safety --------
      # Macro must improve current total by at least min_gain, otherwise it is NOT allowed to compete.
      # Use dynamic mode to auto-adapt to instance difficulty (quantile over recent improvements).
      macro_min_gain_mode: dynamic   # fixed | dynamic
      macro_min_gain: 0.0008
      macro_min_gain_randw: 0.0004
      macro_min_gain_dynamic_window: 200
      macro_min_gain_dynamic_quantile: 0.30
      macro_min_gain_dynamic_scale: 1.0
      macro_min_gain_dynamic_floor: 0.00005
      macro_min_gain_dynamic_cap: 0.003
      macro_min_gain_dynamic_min_samples: 10
      macro_precheck_cooldown_fail: 10
      macro_precheck_cooldown_fail_randw: 6
      macro_precheck_cooldown_fail_late: 2
      macro_min_gain_mid: 0.00015
      macro_min_gain_late: 0.00005

      # Macro-monotone: even if selected, macro must provide >= macro_accept_min_gain improvement.
      macro_monotone_enabled: true
      macro_accept_min_gain: 0.0004
      macro_accept_min_gain_mid: 0.00010
      macro_accept_min_gain_late: 0.00002

      randw_switch_stagnation: 20
      randw_early_horizon_cap: 2
      randw_early_mc_cap: 1
      randw_early_refine_cap: 8
      randw_early_macro_steps_cap: 2
      max_full_verify: 3
      randw_max_full_verify: 2
      max_verify_eval_calls_per_step: 180
      randw_max_verify_eval_calls_per_step: 120
      macro_verify_mode: lite
      lite_macro_steps: 1
      lite_refine_sa_calls: 0
      enable_when_stagnation_ge: 12
      # Make precheck actually active on difficult instances (cluster4 often stagnates <20).
      macro_precheck_every_n_steps: 1
      macro_precheck_stagnation_ge: 15
      pool_override:
        raw_target_size: 24
        raw_target_max: 30
        final_size: 10
        diversity_enabled: false
        coverage_min_per_bucket: 0
    trigger:
      enabled: true
      baseline_warmup_steps: 40
      window: 30
      stagn_ref: 20
      # -------- P4: relative thresholds (avoid instance hard-coding) --------
      repeat_ratio_high_mode: quantile   # fixed | quantile
      repeat_ratio_high: 0.55            # used when mode=fixed
      repeat_ratio_high_quantile: 0.80
      repeat_ratio_min_samples: 20
      repeat_ratio_high_floor: 0.40
      repeat_ratio_high_cap: 0.90

      calls_per_iter_high_mode: relative # fixed | relative
      calls_per_iter_high: 180           # used when mode=fixed
      calls_per_iter_high_mul: 1.25      # baseline(cheap) * mul
      calls_baseline_min_samples: 20
      calls_gate_enabled: true
      macro:
        enable_when_stagnation_ge: 15
        min_interval_steps: 6
        distress_mode: and
        stagnation_extra: 5
        credit_max: 3
        credit_add: 1
        credit_cost: 2
        cooldown_fail: 10
      verifier:
        enable_when_stagnation_ge: 12
        min_interval_steps: 10
        credit_max: 2
        credit_add: 1
        credit_cost: 2
        cooldown_fail: 6
    accept:
      enabled: true
      use_temperature: true
      forbid_none_when_stagnation_ge: 8
    memory:
      enabled: false
      # MemoryBank v1 (structured)
      ttl_steps: 120
      max_size: 64
      max_action_len: 3
      hot_slots_k: 12
      roi_ewma_alpha: 0.2
      min_similarity: 0.4
      cooldown_fail: 20
      max_fail: 6
      age_penalty: 0.001
      propose_topk: 6
      min_gain_store: 0.0005
      min_gain_use: 0.0002
      snapshot_max: 50
      enable_when_stagnation_ge: 12
      propose_every_n_steps: 10
      verify_every_n_steps: 10
      global_gate:
        enabled: true
        window: 40
        fail_rate_hi: 0.75
        cooldown_steps: 30
        min_gain_use: 0.0002

      # 0-call prefilter: only verify memory replays that look improving under analytic delta
      prefilter_enabled: true
      prefilter_min_gain: 0.0001

  lookahead:
    enabled: false
