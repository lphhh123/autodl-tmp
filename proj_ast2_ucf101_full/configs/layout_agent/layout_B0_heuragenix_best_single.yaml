_base_: base_layout_exp.yaml

baseline:
  name: heuragenix
  heuragenix_root: ../HeurAgenix
  problem: wafer_layout
  heuristic_dir: basic_heuristics
  include_legacy_heuristics: true

  method: best_single_sweep
  sweep_skip: do_nothing
  max_eval_calls: 50000
  max_steps: 1000000
  iterations_scale_factor: 1.0
  selection_frequency: 10

  result_dir: result
  max_wallclock_sec: 3600
  require_main_evaluator: true
  allow_fallback_evaluator: false
  run_mode: subprocess

budget:
  total_eval_budget: 50000
  max_wallclock_sec: 3600
