_base_: layout_L4_region_pareto_llm_mpvs_naive_mixed_nollm_exp.yaml

# Headroom probe: ruin-repair macro only (no controller).
detailed_place:
  mpvs:
    proposer:
      quota:
        macro: 3
        mem: 0
    memory:
      enabled: false
    controller:
      enabled: false
    macros:
      # Always enable and ONLY use ruin-repair macro
      base: ["ruin_repair"]
      extra_on_stagnation: []
      enable_base_when_stagnation_ge: 0
      enable_extra_when_stagnation_ge: 999999
      max_macros: 1
      n_steps: 1
      ruin_repair:
        # DANGEROUS ruin_repair (match mpvs_exp.yaml)
        ruin_ratios: [0.20, 0.35, 0.50]
        candidates_per_ratio: 4
        eval_topk: 24
        hot_comm_k: 12
        hot_therm_k: 10
        hot_prob: 0.75
        ruin_site_mode: far
        far_site_k: 80
        eval_random: 4
        repair_pick: sample
        repair_steps: 6
        repair_step_topk: 40
        repair_step_sample_topk: 12
