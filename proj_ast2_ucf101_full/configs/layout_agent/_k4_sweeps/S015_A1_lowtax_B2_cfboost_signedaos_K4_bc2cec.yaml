_base_: S015_A1_lowtax_B2_safe_soft_C0_default_K4_bc2cec.yaml

# Repair version:
# 1) recover the old winning path against std by turning controller-side CEC CF back on
# 2) keep probe-CF active, but make it actually open under current probe budgets
# 3) keep some probe -> selection coupling, but stop over-collapsing search diversity
# 4) keep the raw ablation clean (handled in *_raw.yaml)

detailed_place:
  mpvs:
    macros:
      # Old max_macros=3 was too loose for probe signal transmission;
      # current max_macros=1 is too aggressive and hurts exploration.
      # Use 2 as a balanced middle ground.
      max_macros: 2

      decision:
        # Keep probe->execution transmission, but avoid over-hard racing collapse.
        mode: burst
        burst_calls_frac: 0.04
        burst_calls_min: 900
        burst_calls_late_cap: 1800

      probe:
        # keep recovered cqecc K4 insert points
        trigger_fracs: [0.30, 0.55, 0.75, 0.90]

        # keep better call accounting
        calls_mode: eff
        eff_calls_alpha: 3.0

        # make probe-CF ACTUALLY turn on under current atomic probe size (~10)
        min_atomic_calls_for_cf: 8
        cf_reliability_tau: 20.0

        # use the older, empirically safer subtraction strength
        cf_discount: 0.35
        cf_discount_by_stage: {early: 0.10, mid: 0.30, late: 0.45}
        cf_cap_mult: 1.2

        weight_metric: cf
        update_weight: true
        weight_use_ewma: true
        ewma_alpha: 0.2
        min_gain_per_call: 0.0

        # soften adaptation a bit versus the failed cfboost version
        success_boost_scale: 0.50
        fail_penalty_scale: 0.10

        cf_one_sided_update: true
        cf_one_sided_penalty_mode: raw
        cf_one_sided_penalty_scale: 1.0

        # keep shrinkage, but make it mild
        shrinkage:
          enabled: true
          lambda_calls: 120.0
          prior_alpha: 0.08
          prior_mode: global

        # do not add extra strong-negative punishment in this recovery round
        cf_strong_negative_floor: 0.0
        cf_strong_negative_penalty_scale: 0.0

    controller:
      cec:
        # restore the old strong path that previously helped beat std
        enabled: true
        credit_metric: gain_cf
        counterfactual_credit: true
        counterfactual_use_ctx_atomic: true
        counterfactual_alpha: 0.2
        counterfactual_discount: 0.35
        counterfactual_discount_by_stage: {early: 0.20, mid: 0.35, late: 0.50}
        counterfactual_cap_mult: 1.5
        counterfactual_cap_mult_by_stage: {early: 1.2, mid: 1.5, late: 1.8}
        counterfactual_min_real_calls: 200
        counterfactual_baseline_mode: atomic_cap_ctx_real
        counterfactual_fallback_real_rate: 0.0

        safety:
          mode: conservative_dgate
          lcb_z: 1.0
          min_samples: 3
          lcb_floor: 0.0

        aos:
          probe_feed:
            enabled: true
            use_margin: heur
            gain_scale: 0.20
            require_pass_heur: false
            calls_cap: 1200

            # keep probe feed positive-only for now; recover main effect first
            signed_gain: false
            neg_gain_scale: 0.0
            neg_gain_floor_per_call: 0.0
