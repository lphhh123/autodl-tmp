_base_: ../layout_L4_region_pareto_llm_mpvs_bc2cec_nollm_exp.yaml

# Recovered from cqecc-ALL_B_PACKS.tgz (config_requested.yaml snapshot)
# Fixed K4 schedule: [0.30, 0.55, 0.75, 0.90]
# A1_lowtax + B2_safe_soft + C0_default

detailed_place:
  mpvs:
    macros:
      adapt:
        enabled: true
        ewma_alpha: 0.2
        fail_cooldown: 20
        success_cooldown: 0
        weight_floor: 0.1
        weight_cap: 5.0
        success_boost: 0.2
        fail_penalty: 0.2

      probe:
        enabled: true
        trigger_fracs: [0.30, 0.55, 0.75, 0.90]

        # budget-aware probe (fraction-of-budget)
        stage_call_budget_frac: 0.012
        per_op_call_budget_frac: 0.0
        atomic_call_budget_frac: 0.0
        min_probe_calls: 50
        max_probe_calls: 4000
        min_remaining_calls: 1500

        # probe protocol
        ops: [relink, shake, tabu_search]
        atomic_families: [comm, therm, escape]
        atomic_eval_topk: 10
        macro_n_steps: 1

        # probe CF (B2_safe_soft)
        cf_discount: 0.35
        cf_discount_by_stage: {early: 0.10, mid: 0.30, late: 0.45}
        cf_cap_mult: 1.2
        min_atomic_calls_for_cf: 0
        cf_reliability_tau: 50.0

        weight_metric: cf
        update_weight: true
        weight_use_ewma: true
        ewma_alpha: 0.2
        min_gain_per_call: 0.0

        success_boost_scale: 0.60
        fail_penalty_scale: 0.20

        cf_one_sided_update: true
        cf_one_sided_penalty_mode: raw
        cf_one_sided_penalty_scale: 1.0
