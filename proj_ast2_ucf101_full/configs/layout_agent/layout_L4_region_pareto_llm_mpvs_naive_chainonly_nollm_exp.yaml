_base_: layout_L4_region_pareto_llm_mpvs_naive_mixed_nollm_exp.yaml

# Headroom probe: chain macro only (no controller).
detailed_place:
  mpvs:
    proposer:
      quota:
        macro: 3
        mem: 0
    memory:
      enabled: false
    controller:
      enabled: false
    macros:
      # Always enable and ONLY use chain macro
      base: ["chain"]
      extra_on_stagnation: []
      enable_base_when_stagnation_ge: 0
      enable_extra_when_stagnation_ge: 999999
      max_macros: 1
      n_steps: 5
      chain:
        # DANGEROUS chain (match mpvs_exp.yaml)
        chain_len: 12
        propose_chains: 96
        eval_topk: 24
        step_topk: 25
        step_sample_topk: 10
