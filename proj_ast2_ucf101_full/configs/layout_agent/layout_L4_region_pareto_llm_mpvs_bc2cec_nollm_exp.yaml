_base_: layout_L4_region_pareto_llm_mpvs_ab_nollm_exp.yaml

# BC^2-CEC main method:
# - counterfactual long credit (gain_cf = gain_long - expected_atomic_gain)
# - expected_atomic_gain computed from per-ctx atomic baseline rate (best heuristic entry rate)
detailed_place:
  planner:
    type: heuristic
  mpvs:
    # NEW (default ON): stage-stratified probing + atomic counterfactual baseline
    # This is the main method variant used in the paper tables.
    macros:
      probe:
        enabled: true
        # Keep these explicit for reproducibility (can still be overridden per run).
        trigger_fracs: [0.20, 0.60, 0.85]
        stage_call_budget: 1200
        per_op_call_budget: 0
        atomic_call_budget: 0
        ops: ["relink", "shake", "tabu_search"]
        atomic_families: ["comm", "therm", "escape"]
        # Strengthen atomic probe slightly to make CF less noisy
        atomic_eval_topk: 10
        macro_n_steps: 1
        # Conservative CF w/ stage-wise ramp-up (helps threshold cases)
        cf_discount: 0.35
        cf_discount_by_stage: {early: 0.20, mid: 0.35, late: 0.50}
        cf_cap_mult: 1.5
        min_atomic_calls_for_cf: 180
        ewma_alpha: 0.2
        # Let probes shape macro selection weights (operator-agnostic)
        update_weight: true
        weight_metric: cf
        weight_use_ewma: true
        # gentler penalties from noisy probes
        fail_penalty_scale: 0.25
        min_remaining_calls: 1500
    proposer:
      quota:
        mem: 0
    memory:
      enabled: false
    controller:
      mem:
        enabled: false
      cec:
        enabled: true
        credit_metric: gain_cf
        counterfactual_credit: true
        counterfactual_use_ctx_atomic: true
        counterfactual_alpha: 0.2
        # IMPORTANT: without discount, expected_atomic_gain is often over-estimated -> gain_cf negative -> no release
        counterfactual_discount: 0.35
        # Stage-wise discount: be conservative early, allow more subtraction late
        counterfactual_discount_by_stage: {early: 0.20, mid: 0.35, late: 0.50}
        # Cap atomic baseline by realized-rate when available (prevents optimistic baselines)
        counterfactual_cap_mult: 1.5
        counterfactual_cap_mult_by_stage: {early: 1.2, mid: 1.5, late: 1.8}
        # Only trust realized-rate after enough accumulation (EWMA calls)
        counterfactual_min_real_calls: 200
        # Baseline mode: recommended (avoid global realized fallback that can be polluted by macros)
        counterfactual_baseline_mode: atomic_cap_ctx_real
        counterfactual_fallback_real_rate: 0.0
        # v2.8: AOS-style family selection (non-stationary, budget-stage conditioned)
        aos:
          enabled: true
          window_calls: 6000
          min_samples: 2
          ucb_c: 0.8
          gain_mode: min
          horizon_min: 200
          horizon_frac: 0.006
          horizon_mid_cap: 3200
          horizon_late_cap: 1600
          # conservative counterfactual baseline for AOS credit
          cf_discount: 0.35
          cf_cap_mult: 1.5
