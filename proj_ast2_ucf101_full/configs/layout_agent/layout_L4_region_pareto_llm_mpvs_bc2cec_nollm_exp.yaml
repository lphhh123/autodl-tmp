_base_: layout_L4_region_pareto_llm_mpvs_ab_nollm_exp.yaml

# BC^2-CEC main method:
# - counterfactual long credit (gain_cf = gain_long - expected_atomic_gain)
# - expected_atomic_gain computed from per-ctx atomic baseline rate (best heuristic entry rate)
detailed_place:
  planner:
    type: heuristic
  mpvs:
    # NEW (default ON): stage-stratified probing + atomic counterfactual baseline
    # This is the main method variant used in the paper tables.
    macros:
      probe:
        enabled: true
        # Keep these explicit for reproducibility (can still be overridden per run).
        trigger_fracs: [0.20, 0.60, 0.85]
        stage_call_budget: 1200
        per_op_call_budget: 0
        atomic_call_budget: 0
        ops: ["relink", "shake", "tabu_search"]
        atomic_families: ["comm", "therm", "escape"]
        atomic_eval_topk: 6
        macro_n_steps: 1
        # counterfactual: rate_cf = rate_op - cf_discount * rate_atomic
        cf_discount: 0.7
        ewma_alpha: 0.2
        # Let probes shape macro selection weights (operator-agnostic)
        update_weight: true
        weight_metric: cf
        min_remaining_calls: 1500
    proposer:
      quota:
        mem: 0
    memory:
      enabled: false
    controller:
      mem:
        enabled: false
      cec:
        enabled: true
        credit_metric: gain_cf
        counterfactual_credit: true
        counterfactual_use_ctx_atomic: true
        counterfactual_alpha: 0.2
        # v2.8: AOS-style family selection (non-stationary, budget-stage conditioned)
        aos:
          enabled: true
          window_calls: 6000
          min_samples: 2
          ucb_c: 0.8
          gain_mode: min
          horizon_min: 200
          horizon_frac: 0.006
          horizon_mid_cap: 3200
          horizon_late_cap: 1600
          # conservative counterfactual baseline for AOS credit
          cf_discount: 0.35
          cf_cap_mult: 1.5
