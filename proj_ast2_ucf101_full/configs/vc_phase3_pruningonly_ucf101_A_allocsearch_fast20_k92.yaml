_base_: configs/vc_phase3_pruningonly_ucf101_A_plain_fast20_k92.yaml

alloc_search:
  enabled: true
  search_threads_outer: 6
  search_threads_inner: 5

  sens_ema_alpha: 0.8
  keep_unit: 0.01
  min_keep_floor: 0.25
  pool_size: 6
  max_candidates: 60

  pick_policy: hw_then_risk
  max_acc_risk: 0.01
  min_total_score: 0.0
  min_rel_hw_improve: 0.0001

  gate_apply_blend: 1.0
  min_remain_budget: 0.005
  start_after_prune_epochs: 5
  budget_frac_start: 0.5
  budget_frac_max: 0.8
  budget_frac_ramp_epochs: 10

  # long-range 3-point probing (directional probe on final range, stage-limited apply)
  probe_points: 3
  probe_alphas: [0.3333333333, 0.6666666667, 1.0]
  probe_use_final_range: true
  probe_apply_check: true
