# A4 + ROI-Commit only (no ACHO)
#
# Purpose:
#   - full-version counterpart of A4-ROI ablation
#   - fair comparison against A4 main / A4+ACHO / A4+ACHO+ROI

_base_: configs/vc_phase3_full_ucf101_A_main.yaml

stable_hw:
  acho:
    enabled: false

  discrete_isolation:
    roi_commit:
      enabled: true
      # Use the same normalized HW objective as the training loss.
      metric: L_hw_total
      min_rel_improve: 0.01
      min_abs_improve: 0.0
      min_margin: 0.003
      cooldown_epochs: 2
      keep_ema_alpha: 0.2
      cooldown_scale: 6
      cooldown_max_extra: 6
      require_hw_active: true
      lagrangian:
        enabled: true
        lambda_scale: 30
        risk_weight: 1.5
        margin0: 0.01
        margin_scale: 6.0
