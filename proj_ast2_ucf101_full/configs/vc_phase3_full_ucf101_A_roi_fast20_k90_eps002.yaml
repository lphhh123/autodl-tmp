# A4-fast + ROI only, stronger pruning version

_base_: configs/vc_phase3_full_ucf101_A_main_fast20_k90_eps002.yaml

stable_hw:
  acho:
    enabled: false

  discrete_isolation:
    roi_commit:
      enabled: true
      metric: L_hw_total
      min_rel_improve: 0.01
      min_abs_improve: 0.0
      min_margin: 0.003
      cooldown_epochs: 2
      keep_ema_alpha: 0.2
      cooldown_scale: 6
      cooldown_max_extra: 6
      require_hw_active: true
      lagrangian:
        enabled: true
        lambda_scale: 80
        rank_lambda_scale: 80
        risk_weight: 1.2
        rank_risk_weight: 1.2
        margin0: 0.02
        rank_margin0: 0.02
        margin_scale: 3.0
        rank_margin_scale: 3.0
