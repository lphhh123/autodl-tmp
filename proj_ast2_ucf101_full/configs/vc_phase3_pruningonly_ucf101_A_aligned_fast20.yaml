# Fast-iteration pruning-only baseline (A2-fast): same Version-C trainer path as A4,
# with StableHW guard/ref enabled but HW optimization neutralized.

_base_: configs/vc_phase3_full_ucf101_A_main_fast20.yaml

stable_hw:
  enabled: true
  # Keep StableHW on for self-ref + accuracy guard, but disable HW optimization by setting lambda_hw_max=0.
  force_disable_ok: false
  lambda_hw_schedule:
    enabled: true
    lambda_hw_max: 0.0
  discrete_isolation:
    mapping_update_every_epochs: 1000000000
    layout_update_every_epochs:  1000000000
    roi_commit:
      enabled: false

training:
  inner_steps_alpha: 0
  inner_steps_layout: 0

loss:
  lambda_hw: 0.0

hw:
  lambda_hw: 0.0
