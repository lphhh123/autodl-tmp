# Sensitivity-only allocation baseline:
# - same candidate generator + budget accounting as alloc-search
# - but selects candidate ONLY by acc_risk (sensitivity), not by hardware objective

alloc_search:
  enabled: true

  # new (trainer patch): selection policy
  pick_policy: risk_only
  max_acc_risk: 0.20

  # IMPORTANT: keep this baseline "not hardware-driven":
  # do NOT gate apply by rel_hw_gain. Allow negative gains too.
  min_rel_hw_improve: -1.0

  # keep search knobs aligned with ours
  search_threads_outer: 6
  search_threads_inner: 5

  start_after_prune_epochs: 5
  budget_frac_start: 0.5
  budget_frac_max: 0.8
  budget_frac_ramp_epochs: 10

  sens_ema_alpha: 0.8
  keep_unit: 0.01
  min_keep_floor: 0.25
  pool_size: 6
  max_candidates: 60
  acc_risk_weight: 0.2
