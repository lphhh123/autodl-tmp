# Fast-iteration config (20% data, 10 dense + 20 prune epochs) for Innovation-A channel-pruning mainline.
#
# Intent:
#   - Turn OFF token pruning (token_gating_policy=off)
#   - Keep pruning gentle (gates init near 1; only channel sparsity regularized)
#   - Reduce training volume for rapid iteration (subset_ratio_train=0.2, epochs=30)
#   - Pruning protocol: dense warmup=10, pruning ramp=20

_base_: configs/vc_phase3_full_ucf101_A_main.yaml

data:
  # Deterministic subset for fast iteration.
  subset_ratio_train: 0.20
  subset_ratio_eval:  0.20
  subset_seed: 0

training:
  # Protocol: 10 dense + 20 prune
  outer_epochs: 30
  # Keep eval protocol aligned across fast experiments (full eval each epoch on the same eval subset).
  stable_hw_eval_max_batches: 0
  compute_hw_when_lambda0: true

ast:
  # Disable token pruning entirely; channel pruning is the main structural lever.
  token_gating_policy: "off"
  strict_masking: false
  rho_token_target: 1.0

  # Gates start almost fully open to avoid early accuracy collapse.
  gate_init_open: 0.99
  ch_init_open: 0.99
  head_init_open: 0.99
  block_init_open: 0.99

  schedule:
    enabled: true
    # Keep the model fully dense (incl. channel/head/block gates) until LockedAccRef is ready.
    # This prevents "early pruning" from causing large accuracy drops before the guard becomes active.
    # 10 epochs dense (outer=0..9), start pruning from outer=10
    warmup_epochs: 10
    force_dense_epochs: 10
    # 20 epochs pruning ramp
    ramp_epochs: 20
    curve: "cosine"
    rho_start: 1.0
    temp_start: 1.0
    lambda_ast_start: 0.0
    lambda_ast_end: 0.2

    # MorphNet-style controlled channel pruning: target keep ratio slowly decreases.
    ch_keep_start: 1.0
    ch_keep_end: 0.85
    ch_ramp_epochs: 20

  # Gentle sparsity: focus on channel only.
  loss:
    lambda_token: 0.0
    lambda_head: 0.0
    # Use hinge-to-target (not raw mean keep) to avoid overshooting.
    lambda_ch: 1.0
    lambda_block: 0.0
    ch_reg_mode: "hinge_to_target"
    ch_reg_power: 2.0
    # Avoid "every layer shrinks a bit": prune mostly in later layers.
    ch_layer_policy: "late_only"
    ch_freeze_prefix_ratio: 0.33

  channel_prune:
    # Also hard-protect early layers in forward (common practice)
    freeze_prefix_ratio: 0.33

# IMPORTANT:
# FAST protocol uses self-ref lock at pruning boundary (no external A1 curve required).
stable_hw:
  locked_acc_ref:
    # lock ref at the pruning boundary (end of dense epoch 9)
    freeze_epoch: 10
    strict: true
  lambda_hw_schedule:
    # keep HW pressure off during dense stage, ramp during pruning stage
    warmup_epochs: 10
    ramp_epochs: 20
