# Fast-iteration config (10% train, fast eval, 15 dense + 15 prune epochs)
# for Innovation-A channel-pruning mainline.
#
# Intent:
#   - Keep fast iteration on train subset while making validation quick / stable.
#   - Full fine-tuning from the start (no backbone freeze / no feature-only stage).
#   - Reduce early stochasticity (no mixup, no train jitter, deterministic train sampling).
#   - Turn OFF token pruning (token_gating_policy=off)
#   - Keep pruning gentle (gates init near 1; only channel sparsity regularized)
#   - Pruning protocol: dense warmup=15, pruning ramp=15

_base_: configs/vc_phase3_full_ucf101_A_main.yaml

data:
  # Use smaller training subset for rapid iteration.
  # NOTE: keep eval full to preserve stability of guard/ref.
  subset_ratio_train: 0.10
  subset_ratio_eval:  1.00
  subset_seed: 0
  runtime_tstart_jitter: 0
  frame_sampling_train: "linspace"
  frame_sampling_eval: "linspace"

training:
  # Protocol: 15 dense + 15 prune
  outer_epochs: 30
  # Fast eval each epoch for quick iteration:
  #   >0  : evaluate at most N val batches
  #   <=0 : full val
  stable_hw_eval_max_batches: 200
  compute_hw_when_lambda0: true
  # Shorten HW stabilize window so discrete updates/alpha are not disabled for too long after HW enables.
  # Default (from base) is 2; use 1 for faster divergence diagnosis.
  hw_stabilize_epochs: 1

train:
  # Full-model fine-tuning from the start.
  lr: 4e-4
  warmup_epochs: 15
  backbone_lr_scale: 1.00
  freeze_backbone_epochs: 0
  # Reduce early supervision / augmentation noise.
  label_smoothing: 0.0
  mixup_alpha: 0.0
  mixup_prob: 0.0

model:
  drop_rate: 0.1
  attn_drop: 0.1
  drop_path_rate: 0.05

ast:
  # Disable token pruning entirely; channel pruning is the main structural lever.
  token_gating_policy: "off"
  strict_masking: false
  rho_token_target: 1.0

  # Gates start almost fully open to avoid early accuracy collapse.
  gate_init_open: 0.99
  ch_init_open: 0.99
  head_init_open: 0.99
  block_init_open: 0.99

  schedule:
    enabled: true
    # Keep the model fully dense (incl. channel/head/block gates) until LockedAccRef is ready.
    # This prevents "early pruning" from causing large accuracy drops before the guard becomes active.
    # 15 epochs dense (outer=0..14), start pruning from outer=15
    warmup_epochs: 15
    force_dense_epochs: 15
    # 15 epochs pruning ramp
    ramp_epochs: 15
    curve: "cosine"
    rho_start: 1.0
    temp_start: 1.0
    lambda_ast_start: 0.0
    lambda_ast_end: 0.2

    # MorphNet-style controlled channel pruning: target keep ratio slowly decreases.
    # Start at 1.0 so pruning begins exactly when the ramp starts.
    ch_keep_start: 1.0
    # Start conservative to avoid "pruning-start collapse"; tighten later for final runs.
    ch_keep_end: 0.95
    ch_ramp_epochs: 15

  # Gentle sparsity: focus on channel only.
  loss:
    lambda_token: 0.0
    lambda_head: 0.0
    # Use hinge-to-target (not raw mean keep) to avoid overshooting.
    lambda_ch: 1.0
    lambda_block: 0.0
    ch_reg_mode: "hinge_to_target"
    ch_reg_power: 2.0
    # Avoid "every layer shrinks a bit": prune mostly in later layers.
    ch_layer_policy: "late_only"
    ch_freeze_prefix_ratio: 0.50

  channel_prune:
    # Also hard-protect early layers in forward (common practice)
    freeze_prefix_ratio: 0.50

# IMPORTANT:
# FAST protocol uses self-ref lock at pruning boundary (no external A1 curve required).
stable_hw:
  # Override guard for fast-iteration stability: relax eps + add soft recovery + trust region.
  accuracy_guard:
    controller:
      epsilon_drop: 0.01
      hysteresis: 0.002
      lock_grace_epochs: 3
      k_enter: 2
      k_exit: 2
      margin_exit: 0.002
      # Use soft recovery instead of hard force-dense.
      force_dense_on_violate: false
      trust_region:
        # Max change of ch_keep_target per epoch.
        delta_down: 0.01
        delta_up: 0.05
      soft_recovery:
        enabled: true
        # Raise target keep by this step when violating; repeat after hold if still violating.
        rollback_step: 0.05
        hold_epochs: 2
        max_rollbacks: 6
        # Keep as a last-resort safety only (default off).
        fallback_force_dense: false

  locked_acc_ref:
    source: "self_val_lock"
    self_ref_window: 1
    self_ref_agg: "last"
    # lock exactly to the last dense epoch's validation acc (epoch=14)
    freeze_epoch: 15
    strict: true
  lambda_hw_schedule:
    # keep HW pressure off during dense stage, ramp during pruning stage
    warmup_epochs: 15
    ramp_epochs: 15
