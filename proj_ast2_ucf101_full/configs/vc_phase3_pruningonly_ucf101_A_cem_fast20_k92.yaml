# CEM/ES gradient-free baseline on layer-wise allocation.
# Budget matched to ours: candidate evals per alloc-search outer == max_candidates (default 60).

alloc_search:
  enabled: true
  pick_policy: cem

  # match ours
  search_threads_outer: 6
  search_threads_inner: 5
  start_after_prune_epochs: 5
  budget_frac_start: 0.5
  budget_frac_max: 0.8
  budget_frac_ramp_epochs: 10

  sens_ema_alpha: 0.8
  keep_unit: 0.01
  min_keep_floor: 0.25
  # Standard CEM: do NOT use sensitivity-based pool. Use all prunable layers.
  pool_size: 0
  max_candidates: 60
  acc_risk_weight: 0.2
  # Accuracy-risk constraint per gate change (<=1% drop budget, shared with OURS)
  max_acc_risk: 0.01

  # Budget multiplier: x1 => total_samples=ceil(max_candidates*1.0)=60
  cem_budget_mult: 1.0

  # Optional generic "task proxy" weight (no sensitivity): penalize concentrated pruning.
  # Set to 0.0 to optimize HW-only.
  cem_task_beta: 0.0

  # Direction sampling granularity for CEM (multinomial units over layers)
  cem_dir_units: 16

  # long-range 3-point probing (directional probe on final range, stage-limited apply)
  probe_points: 3
  probe_alphas: [0.3333333333, 0.6666666667, 1.0]
  probe_use_final_range: true
  probe_apply_check: true

  # CEM hyperparams (keep small; budget is fixed by max_candidates)
  cem_iters: 2
  cem_elite_frac: 0.25
  cem_smooth: 0.7
