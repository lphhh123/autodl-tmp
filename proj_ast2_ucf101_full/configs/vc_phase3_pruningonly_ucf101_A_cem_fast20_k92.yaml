_base_: configs/vc_phase3_pruningonly_ucf101_A_plain_fast20_k92.yaml

# CEM/ES gradient-free baseline on layer-wise allocation.
# Budget matched to ours: candidate evals per alloc-search outer == max_candidates (default 60).

alloc_search:
  enabled: true
  pick_policy: cem

  # match ours
  search_threads_outer: 6
  search_threads_inner: 5
  start_after_prune_epochs: 5
  budget_frac_start: 0.5
  budget_frac_max: 0.8
  budget_frac_ramp_epochs: 10

  sens_ema_alpha: 0.8
  keep_unit: 0.01
  min_keep_floor: 0.25
  pool_size: 6
  max_candidates: 60
  acc_risk_weight: 0.2
  max_acc_risk: 0.12

  # CEM hyperparams (keep small; budget is fixed by max_candidates)
  cem_iters: 2
  cem_elite_frac: 0.25
  cem_alpha_strength: 20.0
  cem_smooth: 0.7
