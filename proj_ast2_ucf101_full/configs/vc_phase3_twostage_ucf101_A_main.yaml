# A5 main-table protocol (Version-C two-stage):
# - eval uses clip_len=16 only (stable comparison)
# - retention moderate + stride_ratio to control clip count without large accuracy loss

_base_: configs/vc_phase3_twostage_ucf101.yaml

data:
  clip_lens_train: [16]
  clip_lens_eval: [16]
  train_stride_ratio: 0.75
  eval_stride_ratio: 0.75

  window_retention:
    enabled: false

  runtime_tstart_jitter: 8
  frame_sampling_train: "segment_random"
  frame_sampling_eval: "linspace"
test:
  run_final_test: true

training:
  hw_term_ratio_cap: 0.1
  hw_loss_norm_enabled: true
  hw_loss_norm_ema_alpha: 0.98
  hw_loss_norm_min_denom: 1e-3
  hw_loss_norm_clip: 10.0
  hw_stabilize_epochs: 2
  hw_kill_epochs_on_nan: 3
  outer_epochs: 50
  inner_steps_ast: -1
  stable_hw_eval_max_batches: 500
  # Perf: when lambda_hw_eff==0, skip HW proxy forward (does not change gradients).
  # Keep evaluation (val_acc1) unchanged.
  compute_hw_when_lambda0: false

model:
  drop_rate: 0.1
  attn_drop: 0.1
  drop_path_rate: 0.15

train:
  lr_schedule: "cosine"
  min_lr: 1e-6
  label_smoothing: 0.1
  mixup_alpha: 0.2
  mixup_prob: 1.0
  nan_guard: true
  skip_step_on_nonfinite: true
  ema:
    enabled: true
    decay: 0.9998
    eval: true
  grad_clip_norm: 1.0
  warn_every_steps: 200
  nan_guard_warn_every_steps: 200
