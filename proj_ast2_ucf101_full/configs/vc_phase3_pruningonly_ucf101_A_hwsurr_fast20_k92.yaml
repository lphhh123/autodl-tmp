# HW-surrogate baseline (discrete -> continuous):
# - uses the same StableHW contract + lambda schedule as HW-loss
# - BUT enables surrogate_grad to provide usable gradients wrt keep_factors
#   even when discrete mapping/layout does not change smoothly.

hw:
  surrogate_grad:
    enabled: true
    weight: 1.0
