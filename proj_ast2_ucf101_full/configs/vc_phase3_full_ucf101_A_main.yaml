# A4 main-table protocol (Version-C full):
# - eval uses clip_len=16 only (stable comparison)
# - retention moderate + stride_ratio to control clip count without large accuracy loss

_base_: configs/vc_phase3_full_ucf101.yaml

data:
  clip_lens_train: [16]
  clip_lens_eval: [16]
  train_stride_ratio: 0.75
  eval_stride_ratio: 0.75

  window_retention:
    enabled: false

  runtime_tstart_jitter: 8
  frame_sampling_train: "segment_random"
  frame_sampling_eval: "linspace"
test:
  run_final_test: true

# --- Paper-grade A-main budget (Version-C) ---
training:
  # Version-C trainer uses training.outer_epochs (NOT train.epochs).
  # Must be >= ast.schedule.warmup_epochs(15) to actually enter pruning.
  outer_epochs: 50
  # <=0 means: iterate the whole train dataloader per outer epoch (see trainer patch).
  inner_steps_ast: -1
  # Make StableHW guard decision less noisy. Default was 20 (too jittery).
  stable_hw_eval_max_batches: 500
  # Perf: when lambda_hw_eff==0, skip HW proxy forward (does not change gradients).
  # Keep evaluation (val_acc1) unchanged.
  compute_hw_when_lambda0: true
  hw_term_ratio_cap: 0.1
  hw_loss_norm_enabled: true
  hw_loss_norm_ema_alpha: 0.98
  hw_loss_norm_min_denom: 1e-3
  hw_loss_norm_clip: 10.0
  hw_stabilize_epochs: 2
  hw_kill_epochs_on_nan: 3

model:
  drop_rate: 0.1
  attn_drop: 0.1
  drop_path_rate: 0.15

train:
  lr_schedule: "cosine"
  min_lr: 1e-6
  label_smoothing: 0.1
  mixup_alpha: 0.2
  mixup_prob: 1.0
  nan_guard: true
  skip_step_on_nonfinite: true
  ema:
    enabled: true
    decay: 0.9998
    eval: true
  grad_clip_norm: 1.0
  warn_every_steps: 200
  nan_guard_warn_every_steps: 200


# -------------------------
# AST / channel-gate pruning control (MorphNet-style)
# -------------------------
ast:
  # A-main: token pruning OFF; channel pruning is the primary lever.
  token_gating_policy: "off"
  strict_masking: false
  rho_token_target: 1.0

  gate_init_open: 0.99
  ch_init_open: 0.99
  head_init_open: 0.99
  block_init_open: 0.99

  schedule:
    enabled: true
    # Align with StableHW LockedAccRef (freeze_epoch=15 in base config)
    warmup_epochs: 15
    force_dense_epochs: 15
    ramp_epochs: 10
    curve: "cosine"
    rho_start: 1.0
    temp_start: 1.0
    lambda_ast_start: 0.0
    lambda_ast_end: 0.2

    # Target keep ratio for channel gates (slow/controlled)
    ch_keep_start: 1.0
    ch_keep_end: 0.85
    ch_ramp_epochs: 10

  loss:
    lambda_token: 0.0
    lambda_head: 0.0
    lambda_ch: 1.0
    lambda_block: 0.0
    ch_reg_mode: "hinge_to_target"
    ch_reg_power: 2.0
    ch_layer_policy: "late_only"
    ch_freeze_prefix_ratio: 0.33

  channel_prune:
    freeze_prefix_ratio: 0.33

stable_hw:
  # Do not depend on an external dense baseline for HW refs.
  # Instead, calibrate HW refs from the current run's dense warmup and lock once at the same boundary as acc_ref.
  hw_ref_source: "self_hw_lock"
  baseline_stats_path: ""

  self_hw_lock:
    enabled: true
    window: 3
    agg: "median"
    # 0 => automatically align with stable_hw.locked_acc_ref.freeze_epoch
    lock_epoch: 0
