_base_: ./ast2_ucf101.yaml
training:
  hw_stabilize_epochs: 2
  hw_term_ratio_cap: 0.1
  hw_loss_norm_enabled: true
  hw_loss_norm_ema_alpha: 0.98
  hw_loss_norm_min_denom: 1e-3
  hw_loss_norm_clip: 10.0

hw:
  surrogate_grad:
    enabled: true
    weight: 1.0

train:
  mode: version_c
  # v5.4 contract: keep aligned with stable_hw.accuracy_guard.controller.epsilon_drop
  # to avoid "stable_hw.acc_drop_max missing/0; force to 0.002" fallback logs.
  acc_drop_max: 0.02
  # Reduce log bloat from repeated per-step warnings in Version-C runs.
  # 0 => auto (use LOG_INTERVAL_STEPS / default 200)
  warn_every_steps: 200
  nan_guard_warn_every_steps: 200
  # Use bf16 autocast on RTX 40xx to reduce fp16 overflow/non-finite grads.
  amp_dtype: bf16
stable_hw:
  enabled: true
  # Recovery-only sparsity relaxation. Used by trainer_version_c when StableHW freezes AST schedule.
  # Default 0.02: slightly relax rho_token toward dense during RECOVERY to help exit faster.
  recovery_rho_relax: 0.02
  no_double_scale:
    enabled: true
  warmup:
    enabled: true
    epochs: 1
  locked_acc_ref:
    enabled: true
    # Use per-epoch reference curve parsed from EXP-A1-fast stdout.
    mode: curve_stdout
    source: baseline_stdout_curve
    baseline_stdout_path: outputs/EXP-A1p-fast/seed{seed}/stdout
    baseline_curve_path: outputs/EXP-A1p-fast/seed{seed}/acc_ref_curve.json
    # Make reference consistent with fast-val used in guard; if both full/fast exist, pick fast.
    # Options: fast (default), full, min
    stdout_prefer_mode: fast
    curve_ema_alpha: 0.2
    # Extra slack on reference curve (in addition to epsilon_drop). Recommended: 0.01
    curve_margin: 0.0
  accuracy_guard:
    controller:
      epsilon_drop: 0.02
      use_acc_ema: true
      acc_ema_alpha: 0.3
      k_enter: 2
