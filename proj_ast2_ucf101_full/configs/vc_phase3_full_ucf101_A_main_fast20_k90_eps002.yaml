# Stronger fast-iteration config for Innovation-A
# Key changes relative to vc_phase3_full_ucf101_A_main_fast20.yaml:
#   - stronger channel pruning target: ch_keep_end 0.95 -> 0.90
#   - moderately stricter accuracy guard: epsilon_drop 0.03 -> 0.02
#
# Intent:
#   - push methods further apart than the very conservative fast20 baseline
#   - still remain significantly safer than eps=0.01 experiments
#   - isolate the effect of stronger pruning without changing warmup / prefix protection / trainer logic

_base_: configs/vc_phase3_full_ucf101_A_main_fast20.yaml

ast:
  schedule:
    # Stronger global channel pruning target.
    ch_keep_end: 0.90

stable_hw:
  accuracy_guard:
    controller:
      # Slightly tighter than the current fast20 mainline,
      # but much less restrictive than eps=0.01.
      epsilon_drop: 0.02

