_base_: configs/vc_phase3_pruningonly_ucf101_A25_warm15_prep_k90.yaml
model:
  attn_type: "timeformer_divided"
# DP_SCALE_BATCH=1 时，3卡总 batch=42；如需 45 改为 15
train:
  batch_size: 14

data:
  # warmup only: use larger train subset for a more stable init checkpoint
  subset_ratio_train: 0.30

training:
  # timeformer warmup: stop at outer=8
  outer_epochs: 8
