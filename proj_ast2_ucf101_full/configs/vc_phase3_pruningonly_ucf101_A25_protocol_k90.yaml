_base_: configs/vc_phase3_pruningonly_ucf101_A_plain_fast20_k92.yaml

training:
  outer_epochs: 25
  compute_hw_when_lambda0: false
  init_ckpt_path: ""
  init_ckpt_use_resume_epoch: true
  init_ckpt_load_ema: true
  force_dense_freeze_structural_gates: true

train:
  warmup_epochs: 15

ast:
  schedule:
    warmup_epochs: 15
    force_dense_epochs: 15
    ramp_epochs: 10
    ch_ramp_epochs: 10
    ch_keep_start: 1.0
    ch_keep_end: 0.90
  projection:
    enabled: true

alloc_search:
  enabled: false

partition:
  objective_mode: common_norm_lmc
  ref_latency_ms: 1.0
  ref_mem_mb: 1.0
  ref_comm_ms: 1.0
  w_latency_norm: 1.0
  w_mem_norm: 1.0
  w_comm_norm: 1.0
  use_balance_in_objective: false

hw:
  latency_ref_ms: 2.20
  memory_ref_mb: 230.0
  comm_ref_ms: 0.0055

stable_hw:
  affect_ch_keep_target: false
