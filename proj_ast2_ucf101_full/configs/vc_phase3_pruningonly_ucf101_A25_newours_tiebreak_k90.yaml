_base_: configs/vc_phase3_pruningonly_ucf101_A25_protocol_k90.yaml

alloc_search:
  enabled: true
  controller: new_ours_tiebreak
  candidate_strategy: uniform_all
  keep_incumbent: false
  start_after_prune_epochs: 0
  budget_frac_start: 1.0
  budget_frac_max: 1.0
  budget_frac_ramp_epochs: 1
  min_remain_budget: 1.0e-6
  keep_unit: 0.01
  min_keep_floor: 0.25
  pool_size: 0
  max_candidates: 60
  max_acc_risk: 1000000000.0
  min_rel_hw_improve: 0.0
  probe_points: 3
  probe_alphas: [0.3333333333, 0.6666666667, 1.0]
  probe_use_final_range: true
  probe_apply_check: true
  search_threads_outer: 6
  search_threads_inner: 5

  tiebreak_mode: apply_risk_sens_then_long
  tie_apply_abs: 2.0e-4
  tie_apply_rel: 0.15
  tie_risk_abs: 0.10
  tie_risk_rel: 0.15
  tie_sens_rel: 0.10

stable_hw:
  enabled: false
  enable_guard_controls: false

hw:
  use_hw_loss: false
  lambda_hw: 0.0
